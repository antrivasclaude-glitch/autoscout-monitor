name: AutoScout24 Monitor

on:
  # ─── Solo ejecución manual / webhook externo ─────────────────────────────
  # El cron está desactivado. Para lanzar el agente:
  #
  # Opción A — Desde la UI de GitHub:
  #   Actions → AutoScout24 Monitor → Run workflow
  #
  # Opción B — Via API (curl/Python/n8n/etc.):
  #   curl -X POST \
  #     -H "Authorization: token TU_PAT" \
  #     -H "Accept: application/vnd.github.v3+json" \
  #     https://api.github.com/repos/OWNER/REPO/actions/workflows/monitor.yml/dispatches \
  #     -d '{"ref":"main"}'
  # ─────────────────────────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      razon:
        description: 'Motivo de ejecución (opcional)'
        required: false
        default: 'Ejecución manual'

permissions:
  contents: write   # Necesario para publicar en gh-pages

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Crear google_credentials.json
        run: echo "$GOOGLE_CREDENTIALS_JSON" | base64 -d > google_credentials.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Ejecutar agente
        env:
          EMAIL_PASSWORD:          ${{ secrets.EMAIL_PASSWORD }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:       ${{ github.repository }}
        run: python autoscout_agent.py
        

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mercedes GLC - España — AutoScout24 Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;min-height:100vh;background:var(--bg);color:var(--fg);transition:background .2s,color .2s}
/* ── TEMAS ── */
body.tema-claro{--bg:#f5f5f0;--fg:#1a1a1a;--nav:#1a1a1a;--nav-fg:white;--card:white;--card-b:#ebebeb;--stat:#f9f9f7;--lbl:#aaa;--sep:#ddd;--th:#1a1a1a;--th-fg:white;--th-hov:#2d2d2d;--row-hov:#fafaf8;--td-b:#f2f2f2;--btn:#ddd;--btn-fg:#555;--inp-b:#ddd;--inp-fg:#1a1a1a;--cnt:#999;--badge-n-bg:#dbeafe;--badge-n-fg:#1e3a8a;--badge-b-bg:#fee2e2;--badge-b-fg:#7f1d1d;--badge-c-bg:#f3f4f6;--badge-c-fg:#6b7280;--pc-n:#1e40af;--pc-b:#991b1b;--pc-o:#bbb}
body.tema-oscuro{--bg:#0f1117;--fg:#e2e8f0;--nav:#1e2433;--nav-fg:#e2e8f0;--card:#1e2433;--card-b:#2d3748;--stat:#161b27;--lbl:#64748b;--sep:#2d3748;--th:#1e2433;--th-fg:#94a3b8;--th-hov:#2d3a52;--row-hov:#1a2236;--td-b:#2d3748;--btn:#2d3748;--btn-fg:#94a3b8;--inp-b:#2d3748;--inp-fg:#e2e8f0;--cnt:#64748b;--badge-n-bg:#1e3a5f;--badge-n-fg:#93c5fd;--badge-b-bg:#450a0a;--badge-b-fg:#fca5a5;--badge-c-bg:#1f2937;--badge-c-fg:#9ca3af;--pc-n:#60a5fa;--pc-b:#f87171;--pc-o:#475569}
body.tema-verde{--bg:#f0f7f0;--fg:#1a2e1a;--nav:#1a3a1a;--nav-fg:white;--card:white;--card-b:#c6e6c6;--stat:#edf7ed;--lbl:#6b8f6b;--sep:#c6e6c6;--th:#1a3a1a;--th-fg:white;--th-hov:#2d5a2d;--row-hov:#f5fbf5;--td-b:#e0f0e0;--btn:#c6e6c6;--btn-fg:#1a3a1a;--inp-b:#c6e6c6;--inp-fg:#1a2e1a;--cnt:#6b8f6b;--badge-n-bg:#dcfce7;--badge-n-fg:#14532d;--badge-b-bg:#fef9c3;--badge-b-fg:#713f12;--badge-c-bg:#f0fdf4;--badge-c-fg:#4b5563;--pc-n:#166534;--pc-b:#92400e;--pc-o:#9ca3af}
nav{background:var(--nav);color:var(--nav-fg);padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
nav a{color:#aaa;text-decoration:none;font-size:13px}
nav a:hover{color:var(--nav-fg)}
nav h1{font-size:15px;font-weight:600;flex:1;min-width:180px}
.upd{font-size:12px;color:#666}
.tema-sel{margin-left:auto;display:flex;gap:6px;align-items:center}
.tema-sel span{font-size:11px;color:#888}
.tema-btn{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border .15s}
.tema-btn:hover,.tema-btn.on{border-color:var(--nav-fg)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;padding:16px 24px;background:var(--card);border-bottom:1px solid var(--card-b)}
.stat{background:var(--stat);border-radius:8px;padding:10px 12px}
.slabel{font-size:10px;color:var(--lbl);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.svalue{font-size:18px;font-weight:600}
.sv-blue{color:var(--pc-n)}.sv-red{color:var(--pc-b)}
.controls{padding:12px 24px;background:var(--card);border-bottom:1px solid var(--card-b);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.controls input,.controls select{border:1px solid var(--inp-b);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;background:var(--card);color:var(--inp-fg)}
.controls input:focus,.controls select:focus{outline:none;border-color:var(--fg)}
.controls input{min-width:200px}
.sep{color:var(--sep);font-size:12px}
.count{padding:8px 24px 0;font-size:12px;color:var(--cnt)}
.tw{padding:12px 24px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
thead{background:var(--th);color:var(--th-fg)}
th{padding:10px 12px;text-align:left;font-weight:500;font-size:11px;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:var(--th-hov)}
th.asc::after{content:" ↑"}th.desc::after{content:" ↓"}
td{padding:9px 12px;border-bottom:1px solid var(--td-b);vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:var(--row-hov)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500;white-space:nowrap}
.bn{background:var(--badge-n-bg);color:var(--badge-n-fg)}
.bb{background:var(--badge-b-bg);color:var(--badge-b-fg)}
.bc{background:var(--badge-c-bg);color:var(--badge-c-fg)}
.pm{font-weight:600}.pb{color:var(--pc-n)}.pr{color:var(--pc-b)}
.po{font-size:11px;color:var(--pc-o);text-decoration:line-through;display:block}
.btn-ver{display:inline-block;padding:4px 10px;border:1px solid var(--btn);border-radius:5px;font-size:11px;color:var(--btn-fg);text-decoration:none;white-space:nowrap}
.btn-ver:hover{border-color:var(--fg);color:var(--fg)}
.pag{padding:12px 24px;display:flex;gap:5px;align-items:center;justify-content:center;flex-wrap:wrap}
.pag button{padding:5px 11px;border:1px solid var(--btn);border-radius:5px;background:var(--card);cursor:pointer;font-size:13px;font-family:inherit;color:var(--fg)}
.pag button:hover{border-color:var(--fg)}
.pag button.on{background:var(--th);color:var(--th-fg);border-color:var(--th)}
.pinfo{font-size:12px;color:var(--cnt);margin:0 6px}
.empty{text-align:center;padding:40px;color:var(--cnt);font-size:13px}
</style>
</head>
<body class="tema-claro">
<nav>
  <a href="../index.html">&#8592; Inicio</a>
  <h1>Mercedes GLC - España</h1>
  <span class="upd">Actualizado: 2026-05-22</span>
  <div class="tema-sel">
    <span>Tema</span>
    <div class="tema-btn on" id="tc" title="Claro" style="background:#f5f5f0" onclick="setTema('tema-claro',this)"></div>
    <div class="tema-btn" id="to" title="Oscuro" style="background:#0f1117" onclick="setTema('tema-oscuro',this)"></div>
    <div class="tema-btn" id="tv" title="Verde" style="background:#1a3a1a" onclick="setTema('tema-verde',this)"></div>
  </div>
</nav>
<div class="stats" id="stats"></div>
<div class="controls">
  <input type="text" id="q" placeholder="Buscar título, ciudad...">
  <select id="fe">
    <option value="">Todos los estados</option>
    <option value="NUEVO">Nuevos (hoy)</option>
    <option value="BAJADA">Bajadas (hoy)</option>
    <option value="conocido">Conocidos</option>
  </select>
  <span class="sep">|</span>
  <label style="font-size:12px;color:var(--lbl)">Año desde</label>
  <select id="faf"><option value="">—</option></select>
  <label style="font-size:12px;color:var(--lbl)">hasta</label>
  <select id="fat"><option value="">—</option></select>
  <span class="sep">|</span>
  <label style="font-size:12px;color:var(--lbl)">Precio máx</label>
  <select id="fpm"><option value="">—</option></select>
  <span class="sep">|</span>
  <label style="font-size:12px;color:var(--lbl)">Km máx</label>
  <select id="fkm"><option value="">—</option></select>
</div>
<div class="count" id="cnt"></div>
<div class="tw">
<table>
<thead><tr>
  <th data-c="estado">Estado</th>
  <th data-c="titulo">Título</th>
  <th data-c="precio">Precio</th>
  <th data-c="anio">Año</th>
  <th data-c="kmn">Km</th>
  <th>Combustible</th>
  <th>Ubicación</th>
  <th data-c="fecha_detectado">Detectado</th>
  <th></th>
</tr></thead>
<tbody id="tb"></tbody>
</table>
<p class="empty" id="emp" style="display:none">Sin resultados.</p>
</div>
<div class="pag" id="pag"></div>
<script>
const RAW=[];
const PG=100;
let sC="precio",sD="asc",pg=0;
function setTema(t,el){document.body.className=t;localStorage.setItem("as24-tema",t);document.querySelectorAll(".tema-btn").forEach(b=>b.classList.remove("on"));el.classList.add("on");}
(function(){const t=localStorage.getItem("as24-tema")||"tema-claro";const map={"tema-claro":"tc","tema-oscuro":"to","tema-verde":"tv"};document.body.className=t;const el=document.getElementById(map[t]);if(el){document.querySelectorAll(".tema-btn").forEach(b=>b.classList.remove("on"));el.classList.add("on");}})();
function kmn(s){return s?parseInt(s.replace(/\./g,"").replace(/[^\d]/g,""))||0:0}
function fp(n){n=parseInt(n)||0;return n?n.toLocaleString("es-ES")+" €":"—"}
const ROWS=RAW.map(r=>({...r,precio:parseInt(r.precio)||0,precio_anterior:parseInt(r.precio_anterior)||0,kmn:kmn(r.km)}));
(function init(){
  const anios=[...new Set(ROWS.map(r=>r.anio).filter(Boolean))].sort();
  ["faf","fat"].forEach(id=>{const s=document.getElementById(id);anios.forEach(a=>s.add(new Option(a,a)))});
  const mx=Math.max(...ROWS.map(r=>r.precio),0);
  const pm=document.getElementById("fpm");
  [20000,25000,30000,35000,40000,45000,50000,60000,75000,100000].filter(p=>p<=mx+10000).forEach(p=>pm.add(new Option(p.toLocaleString("es-ES")+" €",p)));
  const mxkm=Math.max(...ROWS.map(r=>r.kmn),0);
  const fkm=document.getElementById("fkm");
  [50000,75000,100000,125000,150000,175000,200000].filter(k=>k<=mxkm+25000).forEach(k=>fkm.add(new Option(k.toLocaleString("es-ES")+" km",k)));
  document.querySelectorAll("th[data-c]").forEach(th=>th.addEventListener("click",()=>{const c=th.dataset.c;if(sC===c)sD=sD==="asc"?"desc":"asc";else{sC=c;sD="asc";}pg=0;render();}));
  ["q","fe","faf","fat","fpm","fkm"].forEach(id=>{const el=document.getElementById(id);el.addEventListener(el.tagName==="INPUT"?"input":"change",()=>{pg=0;render();});});
  const pr=ROWS.map(r=>r.precio).filter(Boolean);
  const kms=ROWS.map(r=>r.kmn).filter(Boolean);
  const nh=ROWS.filter(r=>(r.estado||"").includes("NUEVO")).length;
  const bh=ROWS.filter(r=>(r.estado||"").includes("BAJADA")).length;
  const fs=[...new Set(ROWS.map(r=>r.fecha_detectado).filter(Boolean))].sort();
  const med=pr.length?Math.round(pr.reduce((a,b)=>a+b,0)/pr.length):0;
  const km=kms.length?Math.round(kms.reduce((a,b)=>a+b,0)/kms.length):0;
  document.getElementById("stats").innerHTML=[["Total",ROWS.length,""],["Precio mín",fp(Math.min(...pr)),""],["Precio medio",fp(med),""],["Precio máx",fp(Math.max(...pr)),""],["Km medio",km?km.toLocaleString("es-ES")+" km":"—",""],["Nuevos hoy",nh,"sv-blue"],["Bajadas hoy",bh,"sv-red"],["Desde",fs[0]||"—",""]].map(([l,v,c])=>`<div class="stat"><div class="slabel">${l}</div><div class="svalue ${c}">${v}</div></div>`).join("");
  render();
})();
function filt(){
  const q=document.getElementById("q").value.toLowerCase();
  const fe=document.getElementById("fe").value;
  const af=document.getElementById("faf").value;
  const at=document.getElementById("fat").value;
  const pm=parseInt(document.getElementById("fpm").value)||0;
  const km=parseInt(document.getElementById("fkm").value)||0;
  return ROWS.filter(r=>{
    if(q&&!(r.titulo||"").toLowerCase().includes(q)&&!(r.ubicacion||"").toLowerCase().includes(q))return false;
    if(fe==="NUEVO"&&!(r.estado||"").includes("NUEVO"))return false;
    if(fe==="BAJADA"&&!(r.estado||"").includes("BAJADA"))return false;
    if(fe==="conocido"&&((r.estado||"").includes("NUEVO")||(r.estado||"").includes("BAJADA")))return false;
    if(af&&(r.anio||"")<af)return false;
    if(at&&(r.anio||"")>at)return false;
    if(pm&&r.precio>pm)return false;
    if(km&&r.kmn>km)return false;
    return true;
  });
}
function render(){
  const rows=filt();
  rows.sort((a,b)=>{
    let av=a[sC],bv=b[sC];
    if(["precio","kmn","precio_anterior"].includes(sC)){av=av||0;bv=bv||0;}
    else if(sC==="anio"){av=parseInt(av)||0;bv=parseInt(bv)||0;}
    else{av=(av||"").toLowerCase();bv=(bv||"").toLowerCase();}
    return sD==="asc"?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
  });
  document.querySelectorAll("th[data-c]").forEach(th=>{th.className=th.dataset.c===sC?sD:"";});
  const tot=rows.length,pages=Math.max(1,Math.ceil(tot/PG));
  pg=Math.min(pg,pages-1);
  const sl=rows.slice(pg*PG,(pg+1)*PG);
  document.getElementById("cnt").textContent=`Mostrando ${sl.length} de ${tot} anuncios (${ROWS.length} total)`;
  document.getElementById("tb").innerHTML=sl.map(r=>{
    const n=(r.estado||"").includes("NUEVO"),b=(r.estado||"").includes("BAJADA");
    const bc=n?"bn":b?"bb":"bc";
    const bt=n?"Nuevo hoy":b?`Bajada ${r.porcentaje_bajada||""}%`:"Conocido";
    const pc=n?`<span class="pm pb">${fp(r.precio)}</span>`:b&&r.precio_anterior?`<span class="po">${fp(r.precio_anterior)}</span><span class="pm pr">${fp(r.precio)}</span>`:`<span class="pm">${fp(r.precio)}</span>`;
    const lk=r.url?`<a href="${r.url}" target="_blank" class="btn-ver">Ver &#8594;</a>`:"—";
    return `<tr><td><span class="badge ${bc}">${bt}</span></td><td style="max-width:220px">${r.titulo||"—"}</td><td style="white-space:nowrap">${pc}</td><td>${r.anio||"—"}</td><td style="white-space:nowrap">${r.km||"—"}</td><td style="font-size:12px;color:var(--lbl)">${r.combustible||"—"}</td><td style="font-size:12px;color:var(--lbl)">${r.ubicacion||"—"}</td><td style="font-size:12px;color:var(--cnt)">${r.fecha_detectado||"—"}</td><td>${lk}</td></tr>`;
  }).join("");
  document.getElementById("emp").style.display=tot?"none":"block";
  const pag=document.getElementById("pag");
  if(pages<=1){pag.innerHTML="";return;}
  let h=`<span class="pinfo">${tot} resultados</span>`;
  const fr=Math.max(0,pg-2),to=Math.min(pages-1,pg+2);
  if(fr>0)h+=`<button onclick="pg=0;render()">1</button>${fr>1?'<span class="pinfo">…</span>':''}`;
  for(let i=fr;i<=to;i++)h+=`<button class="${i===pg?"on":""}" onclick="pg=${i};render()">${i+1}</button>`;
  if(to<pages-1)h+=`${to<pages-2?'<span class="pinfo">…</span>':''}`;
  pag.innerHTML=h;
}
</script>
</body>
</html>

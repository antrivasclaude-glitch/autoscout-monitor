C 220 d 4Matic Aut.", "precio": "23990", "precio_anterior": "", "porcentaje_bajada": "", "anio": "2018", "km": "100.894 km", "combustible": "Diésel", "ubicacion": "ALICANTE", "estado": "🆕 NUEVO", "fecha_detectado": "2026-05-21", "url": "https://www.autoscout24.es/anuncios/mercedes-benz-glc-220-220d-4matic-aut-diesel-negro-7d03bf16-8aba-4bfb-992b-9847daa2f143"}, {"id": "b7b37a4a-dd52-4ca0-8ce2-de1b3947ccb8", "titulo": "Mercedes-Benz GLC 220 d 4Matic Aut.", "precio": "23990", "precio_anterior": "", "porcentaje_bajada": "", "anio": "2018", "km": "100.894 km", "combustible": "Diésel", "ubicacion": "PATERNA", "estado": "🆕 NUEVO", "fecha_detectado": "2026-05-21", "url": "https://www.autoscout24.es/anuncios/mercedes-benz-glc-220-220d-4matic-aut-diesel-negro-b7b37a4a-dd52-4ca0-8ce2-de1b3947ccb8"}];
const PG=100;
let sC="precio",sD="asc",pg=0;
function setTema(t,el){document.body.className=t;localStorage.setItem("as24-tema",t);document.querySelectorAll(".tema-btn").forEach(b=>b.classList.remove("on"));el.classList.add("on");}
(function(){const t=localStorage.getItem("as24-tema")||"tema-claro";const map={"tema-claro":"tc","tema-oscuro":"to","tema-verde":"tv"};document.body.className=t;const el=document.getElementById(map[t]);if(el){document.querySelectorAll(".tema-btn").forEach(b=>b.classList.remove("on"));el.classList.add("on");}})();
function kmn(s){return s?parseInt(s.replace(/\./g,"").replace(/[^\d]/g,""))||0:0}
function fp(n){n=parseInt(n)||0;return n?n.toLocaleString("es-ES")+" €":"—"}
const ROWS=RAW.map(r=>({...r,precio:parseInt(r.precio)||0,precio_anterior:parseInt(r.precio_anterior)||0,kmn:kmn(r.km)}));
(function init(){
  const anios=[...new Set(ROWS.map(r=>r.anio).filter(Boolean))].sort();
  ["faf","fat"].forEach(id=>{const s=document.getElementById(id);anios.forEach(a=>s.add(new Option(a,a)))});
  const mx=Math.max(...ROWS.map(r=>r.precio),0);
  const pm=document.getElementById("fpm");
  [20000,25000,30000,35000,40000,45000,50000,60000,75000,100000].filter(p=>p<=mx+10000).forEach(p=>pm.add(new Option(p.toLocaleString("es-ES")+" €",p)));
  const mxkm=Math.max(...ROWS.map(r=>r.kmn),0);
  const fkm=document.getElementById("fkm");
  [50000,75000,100000,125000,150000,175000,200000].filter(k=>k<=mxkm+25000).forEach(k=>fkm.add(new Option(k.toLocaleString("es-ES")+" km",k)));
  document.querySelectorAll("th[data-c]").forEach(th=>th.addEventListener("click",()=>{const c=th.dataset.c;if(sC===c)sD=sD==="asc"?"desc":"asc";else{sC=c;sD="asc";}pg=0;render();}));
  ["q","fe","faf","fat","fpm","fkm"].forEach(id=>{const el=document.getElementById(id);el.addEventListener(el.tagName==="INPUT"?"input":"change",()=>{pg=0;render();});});
  const pr=ROWS.map(r=>r.precio).filter(Boolean);
  const kms=ROWS.map(r=>r.kmn).filter(Boolean);
  const nh=ROWS.filter(r=>(r.estado||"").includes("NUEVO")).length;
  const bh=ROWS.filter(r=>(r.estado||"").includes("BAJADA")).length;
  const fs=[...new Set(ROWS.map(r=>r.fecha_detectado).filter(Boolean))].sort();
  const med=pr.length?Math.round(pr.reduce((a,b)=>a+b,0)/pr.length):0;
  const km=kms.length?Math.round(kms.reduce((a,b)=>a+b,0)/kms.length):0;
  document.getElementById("stats").innerHTML=[["Total",ROWS.length,""],["Precio mín",fp(Math.min(...pr)),""],["Precio medio",fp(med),""],["Precio máx",fp(Math.max(...pr)),""],["Km medio",km?km.toLocaleString("es-ES")+" km":"—",""],["Nuevos hoy",nh,"sv-blue"],["Bajadas hoy",bh,"sv-red"],["Desde",fs[0]||"—",""]].map(([l,v,c])=>`<div class="stat"><div class="slabel">${l}</div><div class="svalue ${c}">${v}</div></div>`).join("");
  render();
})();
function filt(){
  const q=document.getElementById("q").value.toLowerCase();
  const fe=document.getElementById("fe").value;
  const af=document.getElementById("faf").value;
  const at=document.getElementById("fat").value;
  const pm=parseInt(document.getElementById("fpm").value)||0;
  const km=parseInt(document.getElementById("fkm").value)||0;
  return ROWS.filter(r=>{
    if(q&&!(r.titulo||"").toLowerCase().includes(q)&&!(r.ubicacion||"").toLowerCase().includes(q))return false;
    if(fe==="NUEVO"&&!(r.estado||"").includes("NUEVO"))return false;
    if(fe==="BAJADA"&&!(r.estado||"").includes("BAJADA"))return false;
    if(fe==="conocido"&&((r.estado||"").includes("NUEVO")||(r.estado||"").includes("BAJADA")))return false;
    if(af&&(r.anio||"")<af)return false;
    if(at&&(r.anio||"")>at)return false;
    if(pm&&r.precio>pm)return false;
    if(km&&r.kmn>km)return false;
    return true;
  });
}
function render(){
  const rows=filt();
  rows.sort((a,b)=>{
    let av=a[sC],bv=b[sC];
    if(["precio","kmn","precio_anterior"].includes(sC)){av=av||0;bv=bv||0;}
    else if(sC==="anio"){av=parseInt(av)||0;bv=parseInt(bv)||0;}
    else{av=(av||"").toLowerCase();bv=(bv||"").toLowerCase();}
    return sD==="asc"?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
  });
  document.querySelectorAll("th[data-c]").forEach(th=>{th.className=th.dataset.c===sC?sD:"";});
  const tot=rows.length,pages=Math.max(1,Math.ceil(tot/PG));
  pg=Math.min(pg,pages-1);
  const sl=rows.slice(pg*PG,(pg+1)*PG);
  document.getElementById("cnt").textContent=`Mostrando ${sl.length} de ${tot} anuncios (${ROWS.length} total)`;
  document.getElementById("tb").innerHTML=sl.map(r=>{
    const n=(r.estado||"").includes("NUEVO"),b=(r.estado||"").includes("BAJADA");
    const bc=n?"bn":b?"bb":"bc";
    const bt=n?"Nuevo hoy":b?`Bajada ${r.porcentaje_bajada||""}%`:"Conocido";
    const pc=n?`<span class="pm pb">${fp(r.precio)}</span>`:b&&r.precio_anterior?`<span class="po">${fp(r.precio_anterior)}</span><span class="pm pr">${fp(r.precio)}</span>`:`<span class="pm">${fp(r.precio)}</span>`;
    const lk=r.url?`<a href="${r.url}" target="_blank" class="btn-ver">Ver &#8594;</a>`:"—";
    return `<tr><td><span class="badge ${bc}">${bt}</span></td><td style="max-width:220px">${r.titulo||"—"}</td><td style="white-space:nowrap">${pc}</td><td>${r.anio||"—"}</td><td style="white-space:nowrap">${r.km||"—"}</td><td style="font-size:12px;color:var(--lbl)">${r.combustible||"—"}</td><td style="font-size:12px;color:var(--lbl)">${r.ubicacion||"—"}</td><td style="font-size:12px;color:var(--cnt)">${r.fecha_detectado||"—"}</td><td>${lk}</td></tr>`;
  }).join("");
  document.getElementById("emp").style.display=tot?"none":"block";
  const pag=document.getElementById("pag");
  if(pages<=1){pag.innerHTML="";return;}
  let h=`<span class="pinfo">${tot} resultados</span>`;
  const fr=Math.max(0,pg-2),to=Math.min(pages-1,pg+2);
  if(fr>0)h+=`<button onclick="pg=0;render()">1</button>${fr>1?'<span class="pinfo">…</span>':''}`;
  for(let i=fr;i<=to;i++)h+=`<button class="${i===pg?"on":""}" onclick="pg=${i};render()">${i+1}</button>`;
  if(to<pages-1)h+=`${to<pages-2?'<span class="pinfo">…</span>':''}`;
  pag.innerHTML=h;
}
